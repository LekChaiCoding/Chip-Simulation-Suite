# CPW Resonator — AI Simulation Stack design intent template
# Fill every null field via the design_intake.md conversation.
# TARGETS only — COMSOL results are compared against these after simulation.
#
# Typical workflow:
#   1. User fills this template (via AI conversation, not by hand).
#   2. CAD script generates GDS from geometry section.
#   3. COMSOL builds and solves; results populate results/ folder.
#   4. AI compares results vs. target and suggests next iteration.

gdstk:
  tolerance: 0.001   # GDS vertex resolution in µm

target:
  freq_ghz: null           # resonance frequency, e.g. 5.5
  Q_internal: null         # internal quality factor, e.g. 50000
  Q_coupling: null         # coupling Q — must be < Q_internal, e.g. 1000

geometry:
  substrate: null          # "Si" | "AlN" | "Sapphire"
  metal: null              # "Al" | "Nb" | "NbTiN"
  resonator_type: null     # "half_wave" | "quarter_wave"
  line_width_um: null      # CPW center conductor width in µm
  gap_um: null             # CPW gap width in µm
  length_um: null          # resonator total length in µm (null = computed from freq)

comsol:
  wafer_thickness_um: 300                # substrate thickness
  freq_sweep_start_ghz: null             # set to target_freq - 500 MHz
  freq_sweep_stop_ghz: null              # set to target_freq + 500 MHz
  freq_sweep_points: 101

studies_to_run: []
# Supported values: "eigenfrequency", "frequency_sweep"
# Recommended first run: ["eigenfrequency"] to locate resonances quickly (~5 min)
# then ["frequency_sweep"] around the eigenfrequency peak for Q extraction (~30 min)
